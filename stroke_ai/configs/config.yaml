# ============================================================
# Stroke AI — Master Configuration
# ============================================================

project:
  name: "stroke_ai"
  version: "1.0.0"
  description: "AI-Based Stroke Rehabilitation Severity Assessment"

paths:
  data_raw: "data/raw"
  data_processed: "data/processed"
  data_skeleton: "data/skeleton_2d"
  data_features: "data/features"
  outputs: "outputs"
  logs: "outputs/logs"

# ---------------------------------------------------------------------------
# Dataset roots — update these if your data lives elsewhere
# ---------------------------------------------------------------------------
datasets:
  # Kinect 3D skeleton + performance labels (NO IMU)
  stroke_rehab_root: "C:/datasets/Stroke Rehabilitation Exercise Data Utilizing 3D Depth Sensors and IMU Sensors/Stroke Rehabilitation Exercise Data"
  kinect_skeleton_dir: "KINECT_Skeleton_Data"
  participants_info: "Participants_Information.csv"
  performance_scores: "Participants_with_Performance_Scores.csv"

  # OpenPose JSON keypoint sequences (2D: x, y, confidence)
  openpose:
  #   motion_name: folder on disk
    C_Front_Away: "C:/datasets/C_Front_Away/JSON Files"
    C_Sag_Left: "C:/datasets/C_Sag_Left/JSON Files"
    C_Sag_Right: "C:/datasets/C_Sag_Right/JSON Files"

  # Hemiplegia archive (3D joint positions per motion) — add when available
  archive_root: "C:/datasets/archive/data_new"

# ---------------------------------------------------------------------------
# Skeleton ingestion (Phase 1 — primary path when videos unavailable)
# ---------------------------------------------------------------------------
skeleton_ingestion:
  output_format: "npz"           # npz | csv
  max_frames: 500                  # uniform sub-sample cap
  min_frames: 10
  min_confidence: 0.1              # OpenPose: zero-out joints below this
  kinect_coords: "xyz"             # xyz | xyz_quat (store quaternion too)
  save_manifest: true              # write data/processed/manifest.csv

# ---------------------------------------------------------------------------
# Video pipeline (optional — use when RGB videos are available)
# ---------------------------------------------------------------------------
video:
  supported_formats:
    - ".mp4"
    - ".avi"
    - ".mov"
    - ".mkv"
  min_duration_seconds: 1.0
  max_duration_seconds: 300.0
  min_fps: 1.0
  max_fps: 240.0
  min_width: 64
  min_height: 64
  max_width: 7680
  max_height: 4320

frame_extraction:
  target_fps: 10
  max_frames: 500
  min_frames: 10
  resize_width: 256
  resize_height: 256
  quality: 95
  output_format: "jpg"
  batch_size: 32
  use_uniform_sampling: true

logging:
  level: "INFO"
  format: "%(asctime)s | %(name)s | %(levelname)s | %(message)s"
  date_format: "%Y-%m-%d %H:%M:%S"
  file: "outputs/logs/stroke_ai.log"
  max_bytes: 10485760
  backup_count: 5

  datasets:
  stroke_rehab_root: "C:/datasets/Stroke Rehabilitation Exercise Data Utilizing 3D Depth Sensors and IMU Sensors/Stroke Rehabilitation Exercise Data"
  openpose:
    C_Front_Away: "C:/datasets/C_Front_Away/JSON Files"
    C_Sag_Left: "C:/datasets/C_Sag_Left/JSON Files"
    C_Sag_Right: "C:/datasets/C_Sag_Right/JSON Files"
    archive_root: "C:/datasets/archive/data_new"
